<article itemscope itemtype="http://schema.org/BlogPosting" class="blog-post">
  <header>
    <h3 itemprop="name headline">{{ page.title }}
      <span style="display:none"
	    itemprop="author"
	    itemscope
	    itemtype="http://schema.org/Person">
	<span itemprop="name">Caio Oliveira</span>
      </span>
      {% assign words = content | number_of_words %}
      {% if words >= 360 %}
      <span class="reading-time">
	({{ words | divided_by:180 }} min. read)
      </span>
      {% endif %}
    </h3>
    <span class="shared">
      Posted on <span itemprop="datePublished">{{ page.date | date: "%b %-d, %Y" }}</span>
    </span>
  </header>
  <div itemprop="articleBody" class="hyphenate">
    {{ content }}
  </div>
</article>
